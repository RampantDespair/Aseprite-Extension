name: Feature request
description: Suggest an idea or improvement
title: "[FEATURE] "
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        ## 🚀 Feature Request
        Suggest an idea or improvement.

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      description: Which part of the project does this feature relate to?
      options:
        - extension
        - exporter
        - importer
        - renamer
        - sorter
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What problem does this solve?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
      placeholder: Describe your ideal solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds?

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, examples, references, etc.
