# .github/ISSUE_TEMPLATE/bug_report.yml

name: Bug report
description: Report a bug to help us improve
title: "[BUG] "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 Bug Report
        Please fill out the details below to help us reproduce and fix the issue.

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Windows
        - Linux
        - macOS
        - Other
    validations:
      required: true

  - type: input
    id: extension_version
    attributes:
      label: Extension version
      placeholder: e.g. v1.2.3
    validations:
      required: true

  - type: input
    id: aseprite_version
    attributes:
      label: Aseprite version
      placeholder: e.g. v1.2.3
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      description: Which part of the project has the bug?
      options:
        - extension
        - exporter
        - importer
        - renamer
        - sorter
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: Clear and concise description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to...
        2. Click...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / errors
      description: Paste any relevant logs, stack traces, or screenshots

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else we should know?
